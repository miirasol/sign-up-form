<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sign-Up Form</title>
		<link rel="stylesheet" href="styles.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<div class="container">
			<aside class="sidebar">
				<div class="logo">
					<img src="images/odin-logo.png" alt="ODIN LOGO" />ODIN
				</div>
			</aside>
			<main>
				<div class="info">
					<div>
						<h3>
							This is not a real online service! You know you need something
							like this in your life to help you realize your deepest dreams.
							Sign up <em>now</em> to get started.
						</h3>
					</div>
					<div>
						<h3>You <em>know</em> you want to.</h3>
					</div>
				</div>

				<div class="form">
					<form action="post" id="sign_up_form">
						<div>
							<label for="firstname">FIRST NAME</label>
							<input
								type="text"
								id="firstname"
								name="first_name"
								required
								placeholder="John"
							/>
						</div>

						<div>
							<label for="lastname">LAST NAME</label>
							<input
								type="text"
								id="lastname"
								name="last_name"
								required
								placeholder="Doe"
							/>
						</div>

						<div>
							<label for="email">EMAIL</label>
							<input
								type="email"
								id="email"
								name="email"
								required
								placeholder="johndoe@email.com"
							/>
						</div>

						<div>
							<label for="phone">PHONE NUMBER</label>
							<input
								type="tel"
								id="phone"
								name="phone"
								required
								placeholder="+63 912-3456-789"
							/>
						</div>

						<div>
							<label for="password">PASSWORD</label>
							<input
								type="password"
								id="password"
								name="password"
								pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
								title="Must contain at least 8 characters, including one uppercase, one lowercase, one number, and one special character."
								required
							/>
						</div>

						<div>
							<label for="confirmpass">CONFIRM PASSWORD</label>
							<input
								type="password"
								id="confirmpass"
								name="confirm_pass"
								pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
								title="Must contain at least 8 characters, including one uppercase, one lowercase, one number, and one special character."
								required
							/>
						</div>
					</form>
					<button type="submit" form="sign_up_form">Create Account</button>
				</div>

				<div class="login">Already have an account? <a href="">Log in</a></div>
			</main>
		</div>
	</body>
</html>
